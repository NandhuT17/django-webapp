{% extends 'products/base.html' %}

{% block body %}

<div>
    <table class="det-table">
        <tr class="table-head">
            <th class="table-head">S.no</th>
            <th class="table-value" >First name</th>
            <th class="table-value">Last name</th>
            <th class="table-value" >Email</th>
            <th class="table-value" >Role</th>
        </tr>

        {% for i in users %}
            <tr class="row-value">
                <td class="table-value">{{ forloop.counter }}</td>
                <td class="table-value" >{{ i.first_name }}</td>
                <td class="table-value" >{{ i.last_name }}</td>
                <td class="table-value" >{{ i.email }}</td>
                <td class="table-value" >User</td>
            </tr>
        {% endfor %}
    </table>
</div>

{% endblock %}
