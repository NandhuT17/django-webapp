{% extends 'products/base.html' %}

{% block body %}

<div>
    {% for i in products %}
        <div class="products">
            <img class="product-image" src="{{ i.product_image.url }}">
            <div>
                <h2>{{ i.product_name }}</h2>
                <h2 class="product-price">₹ {{ i.product_price }}</h2>
            </div>
            <div>
                <a class="details-button" href="{% url 'dashboard:product_details' i.id %}">Details</a>
            </div>      
        </div>
    {% endfor %}
</div>

{% endblock %}
