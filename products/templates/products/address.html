{% extends 'products/base.html' %}
{% load static %}
{% block body %}

<div class="form-container">
    {% if product_id %}
        <form class="address-form" method="post" action="{% url 'payment-page' product_id %}">
    {% else %}
        <form class="address-form" method="post" action="{% url 'checkout' %}">
    {% endif %}
        {% csrf_token %}

        <label for="country">Country</label>
        <select name="country" id="country">
            <option value="">Select a country</option>
            {% for i in countries %}
                <option value="{{ i }}">{{ i }}</option>
            {% endfor %}
        </select>

        <label for="fullname">Full name (First and last name)</label>
        <input type="text" id="fullname" name="fullname" required>

        <label for="mobilenumber">Mobile number</label>
        <input type="tel" id="mobilenumber" name="mobilenumber" required inputmode="numeric">

        <label for="flat-no">Flat, House no, Building</label>
        <input type="text" id="flat-no" name="flat-no" required>

        <label for="area">Area, Street, Village</label>
        <input type="text" id="area" name="area" required>

        <label for="landmark">Landmark</label>
        <input type="text" id="landmark" name="landmark" required>

        <label for="pincode">Pincode</label>
        <input type="number" id="pincode" name="pincode" required inputmode="numeric">

        <label for="city">Town/City</label>
        <input type="text" id="city" name="city" required>

        <label for="state">State</label>
        <input type="text" id="state" name="state" required>

        <button type="submit">Submit</button>
    </form>
</div>

{% endblock %}
